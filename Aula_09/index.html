<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 09</title>
</head>

<body>
    <h1>Formulario</h1>
    <table border="1">
        <tbody>
            <tr>
                <td><label for="nome">>Nome: </label></td>
                <td><input type="text" name="nome" id="nome" placeholder="Digite o seu nome"></td>
            </tr>
            <tr>
                <td><label for="e-mail">E-mail pessoal: </label></td>
                <td><input type="email" name="email" id="mail"></td>
            </tr>
            <tr>
                <td><label for="email">E-mail (patter): </label></td>
                <td><input type="email" name="emailpatter" id="mailpatter" placeholder="Digite seu email com @"></td>
            </tr>
            <tr>
                <td><label for="senha">Senha: </label></td>
                <td><input type="password" id="senha" name="senha"></td>
            </tr>
            <tr>
                <td><label for="Idade">Idade: </label></td>
                <td><input type="idade" name="idade" id="idade" maxlength="2" size="2"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <table>
                        <tr>
                            <td><label for="comentario">Deixe um comentário: </label></td>
                        </tr>
                        <tr>
                            <td><textarea name="comentario" id="comentario" cols="50" rows="10"></textarea>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <table>
                        <tr>
                            <td><label for="materia-de-interesse">Materia de Interesse: </label></td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="Backend" value="Backend"> Backend</td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="Frontend" value="Frontend">Frontend</td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="Fullstack" value="Fullstack">Fullstack</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <p>Tipo de Viagem</p>
                    <ul type="none">
                        <li><input type="checkbox" name="negocios" value="negocios">Negócios</li>
                        <li><input type="checkbox" name="lazer" value="lazer">Lazer</li>
                        <li><input type="checkbox" name="turismo" id="turismo">Turismo</li>
                        <li><input type="checkbox" name="academico" id="academico">Acadêmico</li>
                    </ul>
                </td>
            </tr>


        </tbody>
    </table>
</body>

</html>
